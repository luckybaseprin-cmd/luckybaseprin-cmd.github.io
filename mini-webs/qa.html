<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f8fafc;color:#0f172a;padding:12px;}
.title{font-weight:700;margin-bottom:10px;}
.list{display:grid;gap:8px;font-size:12px;color:#475569;}
.item{display:flex;gap:8px;align-items:center;}
.check{width:12px;height:12px;border-radius:3px;background:#22c55e;}
</style></head>
<body>
  <div class="title">QA Checklist</div>
  <div class="list">
    <div class="item"><span class="check"></span>Responsive ok</div>
    <div class="item"><span class="check"></span>SEO listo</div>
    <div class="item"><span class="check"></span>Velocidad ok</div>
  </div>
</body>
</html>
