<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desarrollo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:monospace;}
body{background:#0b0f1a;color:#e2e8f0;padding:12px;}
.code{background:#111827;border-radius:10px;padding:10px;font-size:11px;line-height:1.5;}
.tag{color:#60a5fa;}
.kpi{margin-top:10px;display:flex;gap:8px;font-size:10px;color:#94a3b8;}
.badge{background:#22c55e;color:#0b0f1a;padding:2px 6px;border-radius:999px;font-weight:700;}
</style></head>
<body>
  <div class="code">
    <div><span class="tag">const</span> speed = "fast";</div>
    <div><span class="tag">const</span> seo = "ready";</div>
    <div><span class="tag">const</span> responsive = true;</div>
  </div>
  <div class="kpi">
    <span class="badge">A</span>
    <span>Core Web Vitals</span>
  </div>
</body>
</html>
