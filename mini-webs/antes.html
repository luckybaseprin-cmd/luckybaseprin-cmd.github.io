<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f1f1f1;color:#1f2937;}
.header{background:#ffffff;border-bottom:1px solid #e5e7eb;padding:10px 16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.logo{font-weight:700;color:#111827;}
.nav{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:#6b7280;}
.hero{padding:18px 16px;background:#fafafa;}
.hero h1{font-size:20px;margin-bottom:6px;}
.hero p{font-size:12px;color:#6b7280;}
.grid{padding:12px 16px;display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.card{background:#ffffff;border:1px solid #e5e7eb;border-radius:6px;padding:10px;font-size:11px;color:#6b7280;}
.cta{margin:12px 16px;padding:10px;border-radius:4px;background:#d1d5db;color:#111827;font-weight:600;text-align:center;font-size:12px;}
</style></head>
<body>
  <div class="header">
    <div class="logo">MiWeb</div>
    <div class="nav">Inicio Servicios Portfolio Blog Contacto FAQ Login</div>
  </div>
  <div class="hero">
    <h1>Pagina antigua</h1>
    <p>Texto largo sin jerarquia y sin un CTA claro.</p>
  </div>
  <div class="grid">
    <div class="card">Bloque 1</div>
    <div class="card">Bloque 2</div>
    <div class="card">Bloque 3</div>
    <div class="card">Bloque 4</div>
  </div>
  <div class="cta">Boton perdido</div>
</body>
</html>
