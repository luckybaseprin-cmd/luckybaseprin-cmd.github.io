<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f3f4f6;color:#111827;padding:12px;}
.block{background:#e5e7eb;border-radius:8px;height:18px;margin-bottom:8px;}
.block.large{height:32px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.card{background:#e5e7eb;border-radius:8px;height:70px;}
.cta{margin-top:12px;width:120px;height:24px;border-radius:999px;background:#d1d5db;}
</style></head>
<body>
  <div class="block large"></div>
  <div class="block"></div>
  <div class="block" style="width:80%;"></div>
  <div class="row">
    <div class="card"></div>
    <div class="card"></div>
  </div>
  <div class="cta"></div>
</body>
</html>
