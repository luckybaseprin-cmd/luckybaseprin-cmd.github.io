<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diseño</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}
body{background:linear-gradient(135deg,#0a74ff,#00c2a8);color:#fff;padding:12px;}
.title{font-size:18px;font-weight:700;margin-bottom:8px;}
.line{height:8px;border-radius:999px;background:rgba(255,255,255,0.4);margin-bottom:6px;}
.card{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:10px;padding:10px;margin-top:10px;}
.badge{display:inline-block;padding:4px 10px;border-radius:999px;background:#ffffff;color:#0a74ff;font-size:10px;font-weight:700;}
</style></head>
<body>
  <div class="title">Direccion visual</div>
  <div class="line" style="width:80%;"></div>
  <div class="line" style="width:65%;"></div>
  <div class="card">
    <div class="badge">UI Kit</div>
    <div class="line" style="margin-top:8px;width:70%;"></div>
    <div class="line" style="width:50%;"></div>
  </div>
</body>
</html>
