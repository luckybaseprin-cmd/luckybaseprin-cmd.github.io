<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero LuckyWeb</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}
body{background:#f8fafc;color:#0f172a;}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #e2e8f0;background:#ffffff;}
.logo{font-weight:700;letter-spacing:1px;}
.badge{background:#0a74ff;color:#fff;padding:4px 10px;border-radius:999px;font-size:10px;}
.hero{padding:16px 14px 8px;background:linear-gradient(135deg,#ffffff,#eef5ff);}
.hero h1{font-size:20px;margin-bottom:6px;}
.hero p{font-size:12px;color:#64748b;margin-bottom:10px;}
.cta{display:inline-block;background:#0f172a;color:#fff;padding:7px 12px;border-radius:999px;font-size:11px;}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 14px;}
.metric{background:#ffffff;border:1px solid #e2e8f0;border-radius:10px;padding:8px;font-size:10px;color:#64748b;}
.metric strong{display:block;color:#0f172a;font-size:12px;margin-bottom:2px;}
.cards{padding:0 14px 14px;display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.card{background:#ffffff;border:1px solid #e2e8f0;border-radius:10px;padding:8px;font-size:10px;color:#64748b;}
</style></head>
<body>
  <div class="header">
    <div class="logo">LuckyWeb</div>
    <div class="badge">Propuesta 24h</div>
  </div>
  <div class="hero">
    <h1>Web que convierte</h1>
    <p>Diseño claro, estructura limpia y CTA visible desde el primer scroll.</p>
    <span class="cta">Solicitar propuesta</span>
  </div>
  <div class="metrics">
    <div class="metric"><strong>Responsive</strong>Movil y desktop</div>
    <div class="metric"><strong>SEO listo</strong>Base tecnica</div>
    <div class="metric"><strong>CTA claro</strong>Conversion</div>
  </div>
  <div class="cards">
    <div class="card">Bloques visuales</div>
    <div class="card">Mensaje principal</div>
    <div class="card">Seccion servicios</div>
    <div class="card">Contacto directo</div>
  </div>
</body>
</html>
