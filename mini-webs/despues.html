<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Despues</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}
body{background:#ffffff;color:#0f172a;}
.header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e5e7eb;}
.logo{font-weight:700;letter-spacing:1px;}
.btn{background:#0a74ff;color:#fff;padding:6px 12px;border-radius:999px;font-size:11px;}
.hero{padding:18px 16px;}
.hero h1{font-size:22px;margin-bottom:6px;}
.hero p{font-size:12px;color:#64748b;margin-bottom:10px;}
.hero .cta{display:inline-block;background:#0f172a;color:#fff;padding:8px 14px;border-radius:999px;font-size:11px;}
.features{padding:0 16px 16px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.card{background:#f8fafc;border-radius:10px;padding:10px;font-size:11px;color:#475569;}
</style></head>
<body>
  <div class="header">
    <div class="logo">LuckyWeb</div>
    <div class="btn">Solicitar propuesta</div>
  </div>
  <div class="hero">
    <h1>Web que convierte</h1>
    <p>Mensaje claro, visual destacado y CTA visible.</p>
    <span class="cta">Empezar</span>
  </div>
  <div class="features">
    <div class="card">Diseño limpio</div>
    <div class="card">CTA claro</div>
    <div class="card">Responsive</div>
    <div class="card">SEO listo</div>
  </div>
</body>
</html>
